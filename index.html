<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Mode</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      z-index: 2;
    }

    .center {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      pointer-events: none;
      z-index: 2;
    }

    .panel {
      background: rgba(10, 16, 32, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 22px 28px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      max-width: 90vw;
    }

    .title {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="hud" id="hud">Score: 0</div>

  <div class="center" id="startScreen">
    <div class="panel">
      <div class="title">Wave Mode</div>
      <div class="subtitle">
        Hold Space, Mouse, or Touch to rise<br />
        Release to drop<br />
        Press Enter or click to start
      </div>
    </div>
  </div>

  <div class="center hidden" id="gameOverScreen">
    <div class="panel">
      <div class="title">Game Over</div>
      <div class="subtitle">
        Press R to restart<br />
        or click / tap to try again
      </div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");

    let W = 0, H = 0, dpr = 1;

    const bgImg = new Image();
    bgImg.src = "https://i.imgur.com/8nBgpwT.png";

    const shipImg = new Image();
    shipImg.src = "https://i.imgur.com/Rz2hHyu.png";

    const game = {
      state: "start",
      score: 0,
      time: 0,
      speed: 6.7,
      cameraX: 0,
      ship: {
        wx: 180,
        y: 0,
        hold: false,
        angle: 0
      },
      obstacles: [],
      particles: [],
      trail: []
    };

    let spawnTimer = 0;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function resize() {
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      if (game.ship) {
        game.ship.y = clamp(game.ship.y || H / 2, 20, H - 20);
      }
    }

    window.addEventListener("resize", resize);

    function resetGame() {
      game.state = "playing";
      game.score = 0;
      game.time = 0;
      game.speed = 6.7;
      game.cameraX = 0;
      game.ship.wx = 180;
      game.ship.y = H / 2;
      game.ship.hold = false;
      game.ship.angle = 0;
      game.obstacles.length = 0;
      game.particles.length = 0;
      game.trail.length = 0;
      spawnTimer = 0;
      startScreen.classList.add("hidden");
      gameOverScreen.classList.add("hidden");
    }

    function gameOver() {
      if (game.state !== "playing") return;
      game.state = "over";
      gameOverScreen.classList.remove("hidden");
    }

    function spawnObstacle() {
      const gapBase = Math.max(160, 240 - game.time * 0.25);
      const gap = clamp(gapBase, 120, 240);
      const margin = 70;
      const center = margin + Math.random() * (H - margin * 2);
      const topHeight = Math.max(0, center - gap / 2);
      const bottomY = center + gap / 2;

      game.obstacles.push({
        wx: game.cameraX + W + 60,
        w: 70,
        topHeight,
        bottomY
      });
    }

    function addWaveParticles() {
      for (let i = 0; i < 2; i++) {
        game.particles.push({
          x: game.ship.wx - game.cameraX - 10,
          y: game.ship.y + (Math.random() * 12 - 6),
          vx: -1.5 - Math.random() * 1.6,
          vy: (Math.random() - 0.5) * 1.6,
          life: 1,
          size: 1.8 + Math.random() * 2.4
        });
      }
    }

    function drawBackground() {
      if (bgImg.complete && bgImg.naturalWidth > 0) {
        const imgRatio = bgImg.naturalWidth / bgImg.naturalHeight;
        const canvasRatio = W / H;

        let sx = 0, sy = 0, sw = bgImg.naturalWidth, sh = bgImg.naturalHeight;

        if (imgRatio > canvasRatio) {
          sw = bgImg.naturalHeight * canvasRatio;
          sx = (bgImg.naturalWidth - sw) / 2;
        } else {
          sh = bgImg.naturalWidth / canvasRatio;
          sy = (bgImg.naturalHeight - sh) / 2;
        }

        ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, W, H);
      } else {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#0b1020");
        grad.addColorStop(1, "#101a33");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawTrail() {
      if (game.trail.length < 2) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      for (let i = 1; i < game.trail.length; i++) {
        const a = game.trail[i - 1];
        const b = game.trail[i];
        const alpha = i / game.trail.length;

        ctx.globalAlpha = alpha * 0.6;
        ctx.strokeStyle = "#8fd3ff";
        ctx.lineWidth = 5 * alpha;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < game.trail.length; i++) {
        const p = game.trail[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();

      ctx.restore();
      ctx.globalAlpha = 1;
    }

    function drawPlayer() {
      const screenX = game.ship.wx - game.cameraX;
      const s = game.ship;

      ctx.save();
      ctx.translate(screenX, s.y);

      // 90 degrees clockwise, plus the wave tilt.
      ctx.rotate(Math.PI / 2 + s.angle);

      if (shipImg.complete && shipImg.naturalWidth > 0) {
        // Keep the image proportions so it does not get squished.
        const scale = 0.08;
        const drawW = shipImg.naturalWidth * scale;
        const drawH = shipImg.naturalHeight * scale;
        ctx.drawImage(shipImg, -drawW / 2, -drawH / 2, drawW, drawH);
      } else {
        ctx.fillStyle = "#8fd3ff";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(-10, -6);
        ctx.lineTo(10, 0);
        ctx.lineTo(-10, 6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawObstacles() {
      for (const o of game.obstacles) {
        const x = o.wx - game.cameraX;

        ctx.fillStyle = "#141414";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";

        ctx.fillRect(x, 0, o.w, o.topHeight);
        ctx.strokeRect(x, 0, o.w, o.topHeight);

        ctx.fillRect(x, o.bottomY, o.w, H - o.bottomY);
        ctx.strokeRect(x, o.bottomY, o.w, H - o.bottomY);

        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fillRect(x + o.w - 10, 0, 10, o.topHeight);
        ctx.fillRect(x + o.w - 10, o.bottomY, 10, H - o.bottomY);
      }
    }

    function drawParticles() {
      for (const p of game.particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = "#8fd3ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function collideRectCircle(px, py, radius, rx, ry, rw, rh) {
      const cx = clamp(px, rx, rx + rw);
      const cy = clamp(py, ry, ry + rh);
      const dx = px - cx;
      const dy = py - cy;
      return dx * dx + dy * dy < radius * radius;
    }

    function update() {
      if (game.state !== "playing") return;

      game.time += 1 / 60;
      game.score += 1 / 60;
      game.speed = 6.7 + game.time * 0.025;

      const ship = game.ship;
      const screenX = ship.wx - game.cameraX;

      // Wave movement, sharp and zigzaggy.
      const waveSpeed = 6.5 + game.time * 0.01;
      if (ship.hold) {
        ship.y -= waveSpeed;
        ship.angle = -0.60;
      } else {
        ship.y += waveSpeed;
        ship.angle = 0.60;
      }

      // Small forward drift so the wave feels alive.
      ship.wx += game.speed * 0.9;
      game.cameraX += game.speed * 0.9;

      ship.y = clamp(ship.y, 0, H);

      game.trail.push({ x: screenX, y: ship.y });
      if (game.trail.length > 0) game.trail.shift();

      addWaveParticles();

      if (ship.y <= 0 || ship.y >= H) {
        gameOver();
      }

      spawnTimer++;
      const spawnEvery = Math.max(80, 130 - game.time * 0.45);
      if (spawnTimer >= spawnEvery) {
        spawnTimer = 0;
        spawnObstacle();
      }

      const shipRadius = 12;
      const shipScreenX = ship.wx - game.cameraX;

      for (const o of game.obstacles) {
        const ox = o.wx - game.cameraX;

        const topHit = collideRectCircle(shipScreenX, ship.y, shipRadius, ox, 0, o.w, o.topHeight);
        const bottomHit = collideRectCircle(shipScreenX, ship.y, shipRadius, ox, o.bottomY, o.w, H - o.bottomY);

        if (topHit || bottomHit) {
          gameOver();
        }
      }

      game.obstacles = game.obstacles.filter(o => (o.wx - game.cameraX) + o.w > -60);

      for (const p of game.particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.04;
      }
      game.particles = game.particles.filter(p => p.life > 0);
    }

    function render() {
      drawBackground();
      drawTrail();
      drawParticles();
      drawObstacles();
      drawPlayer();

      hud.textContent = "Score: " + Math.floor(game.score);
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    function setHold(on) {
      if (game.state === "start") resetGame();
      if (game.state === "over") resetGame();
      game.ship.hold = on;
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        setHold(true);
      }
      if (e.code === "Enter" && game.state !== "playing") {
        resetGame();
      }
      if (e.code === "KeyR") {
        resetGame();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        game.ship.hold = false;
      }
    });

    window.addEventListener("mousedown", () => {
      setHold(true);
    });

    window.addEventListener("mouseup", () => {
      game.ship.hold = false;
    });

    window.addEventListener("touchstart", (e) => {
      e.preventDefault();
      setHold(true);
    }, { passive: false });

    window.addEventListener("touchend", () => {
      game.ship.hold = false;
    });

    window.addEventListener("click", () => {
      if (game.state !== "playing") {
        resetGame();
      }
    });

    resize();
    game.ship.y = H / 0;
    render();
    loop();
  </script>
</body>
</html>
